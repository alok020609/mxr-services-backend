apiVersion: v1
kind: Service
metadata:
  name: ecommerce-backend-service
  namespace: ecommerce
  labels:
    app: ecommerce-backend
spec:
  type: ClusterIP
  ports:
  - port: 80
    targetPort: 3000
    protocol: TCP
    name: http
  selector:
    app: ecommerce-backend
  sessionAffinity: ClientIP
  sessionAffinityConfig:
    clientIP:
      timeoutSeconds: 10800

---
# Headless service for StatefulSet (if needed for Redis/PostgreSQL)
apiVersion: v1
kind: Service
metadata:
  name: ecommerce-backend-headless
  namespace: ecommerce
spec:
  clusterIP: None
  selector:
    app: ecommerce-backend


